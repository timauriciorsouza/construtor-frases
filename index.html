<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🌈 Vamos Montar Frases!</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FFF8F0;
  --c1: #FF6B6B; --c1l: #FFE5E5; --c1d: #CC4444;
  --c2: #FF9F43; --c2l: #FFF3E0; --c2d: #CC7A1E;
  --c3: #54A0FF; --c3l: #E8F4FF; --c3d: #2277DD;
  --c4: #5F27CD; --c4l: #EDE7F6; --c4d: #3D1590;
  --c5: #1DD1A1; --c5l: #E0FAF3; --c5d: #0ABF76;
  --c6: #FF6EB4; --c6l: #FFE8F4; --c6d: #CC3D88;
  --c7: #FECA57; --c7l: #FFFDE7; --c7d: #C9A000;
  --c8: #48DBFB; --c8l: #E3FAFF; --c8d: #00B4D8;
  --text: #2D2D2D;
  --radius: 22px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Nunito', sans-serif; background: var(--bg); min-height: 100vh; overflow-x: hidden; }
body::before {
  content: ''; position: fixed; inset: 0;
  background: radial-gradient(circle at 10% 20%, #FFE5E580 0%, transparent 40%), radial-gradient(circle at 90% 80%, #E8F4FF80 0%, transparent 40%);
  pointer-events: none; z-index: 0;
}
.screen { display: none; min-height: 100vh; position: relative; z-index: 1; }
.screen.active { display: flex; flex-direction: column; }
.top-bar { display: flex; align-items: center; gap: 12px; padding: 16px 20px 10px; position: sticky; top: 0; background: var(--bg); z-index: 10; }
.top-bar h1 { font-family: 'Fredoka One', cursive; font-size: 1.4rem; flex: 1; text-align: center; }
.icon-btn { width: 52px; height: 52px; border-radius: 16px; border: none; font-size: 1.4rem; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 900; transition: transform .15s; box-shadow: 0 4px 0 rgba(0,0,0,0.12); }
.icon-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.12); }
.icon-btn.back { background: #eee; color: #555; }
#screen-home { justify-content: flex-start; align-items: center; padding: 24px 20px 30px; gap: 16px; }
.home-mascot { font-size: 5rem; text-align: center; animation: bounce 2s infinite; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
.home-title { text-align: center; font-family: 'Fredoka One', cursive; font-size: 2.4rem; line-height: 1.15; background: linear-gradient(135deg,#FF6B6B,#FF9F43,#54A0FF,#1DD1A1); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.home-sub { text-align: center; font-size: 1rem; color: #777; font-weight: 700; }
.home-questions { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 500px; }
.q-btn { padding: 20px 22px; border-radius: 22px; border: none; font-family: 'Fredoka One', cursive; font-size: 1.35rem; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 16px; transition: transform .15s, box-shadow .15s; width: 100%; }
.q-btn:active { transform: translateY(5px); }
.q-btn .q-icon { font-size: 2.4rem; flex-shrink: 0; }
.q-btn .q-text { flex: 1; }
.q-btn .q-arrow { font-size: 1.1rem; opacity: .7; }
.sentence-zone { margin: 10px 14px; min-height: 100px; background: white; border-radius: 20px; padding: 14px 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border: 3px dashed #ddd; position: relative; }
.sentence-label { font-size: 0.72rem; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; color: #aaa; margin-bottom: 8px; }
.sentence-words { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; min-height: 52px; }
.sentence-chip { display: flex; align-items: center; gap: 6px; padding: 9px 14px; border-radius: 50px; font-family: 'Fredoka One', cursive; font-size: 1.1rem; cursor: pointer; transition: transform .15s; animation: popIn .25s cubic-bezier(.34,1.56,.64,1); }
@keyframes popIn { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }
.sentence-chip:active { transform: scale(.9); }
.sentence-chip .chip-x { font-size:.85rem; opacity:.5; margin-left:4px; }
.sentence-placeholder { color:#ccc; font-size:.95rem; font-weight:700; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; width:80%; }
.sentence-actions { display: flex; gap: 10px; margin: 8px 14px; }
.act-btn { flex: 1; padding: 14px 10px; border-radius: 16px; border: none; font-family: 'Fredoka One', cursive; font-size: 1rem; cursor: pointer; box-shadow: 0 5px 0 rgba(0,0,0,0.12); transition: transform .15s, box-shadow .15s; }
.act-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.12); }
.act-btn.speak { background: var(--c5); color: white; }
.act-btn.clear { background: #eee; color: #555; }
.act-btn.celebrate { background: var(--c7); color: #7a5800; }
.step-bar { display: flex; align-items: center; gap: 8px; padding: 8px 16px; overflow-x: auto; scrollbar-width: none; }
.step-bar::-webkit-scrollbar { display: none; }
.step-dot { width: 10px; height: 10px; border-radius: 50%; background: #ddd; flex-shrink: 0; transition: all .3s; }
.step-dot.active { background: var(--c3); transform: scale(1.4); }
.step-dot.done { background: var(--c5); }
.cat-label { padding: 4px 16px; font-size: .9rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; color: #888; }
.word-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 8px 14px 14px; }
.word-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; padding: 18px 10px; border-radius: 22px; border: none; cursor: pointer; transition: transform .15s, box-shadow .15s; font-family: 'Nunito', sans-serif; font-weight: 900; animation: fadeIn .3s ease; min-height: 115px; }
@keyframes fadeIn { from{opacity:0;transform:scale(.9)} to{opacity:1;transform:scale(1)} }
.word-btn:active { transform: translateY(5px); }
.word-btn .w-emoji { font-size: 2.8rem; line-height: 1; }
.word-btn .w-text { font-size: 1.1rem; text-align: center; line-height: 1.2; }
.skip-row { padding: 4px 14px 10px; display: flex; }
.skip-btn { flex: 1; padding: 13px; border-radius: 14px; border: none; font-family: 'Fredoka One', cursive; font-size: 1rem; cursor: pointer; background: white; color: #aaa; box-shadow: 0 4px 0 rgba(0,0,0,0.08); transition: transform .15s; }
.skip-btn:active { transform: translateY(3px); }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; padding: 24px; }
.modal-overlay.show { display: flex; }
.modal-card { background: white; border-radius: 28px; padding: 36px 28px; max-width: 380px; width: 100%; text-align: center; animation: popIn .35s cubic-bezier(.34,1.56,.64,1); box-shadow: 0 20px 60px rgba(0,0,0,.25); }
.modal-emoji { font-size: 5rem; margin-bottom: 12px; }
.modal-title { font-family: 'Fredoka One', cursive; font-size: 2rem; margin-bottom: 8px; }
.modal-sentence { font-size: 1.3rem; font-weight: 800; margin: 16px 0; line-height: 1.5; padding: 14px; background: #f8f8f8; border-radius: 14px; color: var(--text); }
.modal-btns { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
.modal-btn { padding: 16px; border-radius: 16px; border: none; font-family: 'Fredoka One', cursive; font-size: 1.15rem; cursor: pointer; color: white; box-shadow: 0 5px 0 rgba(0,0,0,.15); transition: transform .15s; }
.modal-btn:active { transform: translateY(3px); }
.modal-btn.again { background: linear-gradient(135deg,var(--c5),var(--c5d)); }
.modal-btn.home { background: linear-gradient(135deg,var(--c3),var(--c3d)); }
#screen-settings { padding-bottom: 30px; }
.settings-section { padding: 0 16px; }
.settings-title { font-family: 'Fredoka One', cursive; font-size: 1.2rem; margin: 16px 0 10px; color: #555; }
.settings-form { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,.07); }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-weight: 800; font-size: .82rem; color: #888; margin-bottom: 6px; letter-spacing: .5px; text-transform: uppercase; }
.form-group input, .form-group select { width: 100%; padding: 12px 14px; border-radius: 14px; border: 2.5px solid #eee; font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 700; background: #fafafa; transition: border-color .2s; }
.form-group input:focus, .form-group select:focus { outline: none; border-color: var(--c3); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.add-btn { width: 100%; padding: 14px; border-radius: 14px; border: none; font-family: 'Fredoka One', cursive; font-size: 1.1rem; cursor: pointer; color: white; background: linear-gradient(135deg,var(--c3),var(--c4)); box-shadow: 0 5px 0 rgba(95,39,205,.3); transition: transform .15s; margin-top: 4px; }
.add-btn:active { transform: translateY(3px); }
.items-list { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }
.item-row { display: flex; align-items: center; gap: 10px; background: white; border-radius: 14px; padding: 12px 16px; box-shadow: 0 3px 10px rgba(0,0,0,.06); }
.item-row-info { flex: 1; }
.item-row-info strong { font-weight: 800; font-size: .95rem; }
.item-row-info span { display: block; font-size: .8rem; color: #aaa; }
.del-btn { background: #FFE5E5; color: var(--c1); border: none; border-radius: 10px; padding: 8px 12px; cursor: pointer; font-size: 1rem; font-weight: 800; }
.emoji-options { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
.ep-btn { font-size: 1.8rem; background: #f5f5f5; border: 2.5px solid transparent; border-radius: 12px; padding: 6px 10px; cursor: pointer; transition: all .15s; }
.ep-btn.selected { border-color: var(--c3); background: var(--c3l); }
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: #333; color: white; padding: 12px 24px; border-radius: 50px; font-weight: 800; font-size: .9rem; opacity: 0; transition: all .3s; z-index: 300; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.confetti-piece { position: fixed; width: 10px; height: 10px; border-radius: 2px; animation: confettiFall 3s ease-out forwards; z-index: 500; pointer-events: none; }
@keyframes confettiFall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(100vh) rotate(720deg);opacity:0} }
.manage-btn { display: block; margin: 0 auto; padding: 12px 28px; border-radius: 50px; border: none; background: var(--c7); color: #7a5800; font-family: 'Fredoka One', cursive; font-size: 1.05rem; cursor: pointer; box-shadow: 0 5px 0 var(--c7d); transition: transform .15s; }
.manage-btn:active { transform: translateY(3px); }
</style>
</head>
<body>

<div id="screen-home" class="screen active">
  <div style="padding:24px 20px 0; text-align:center;">
    <div class="home-mascot">🌈</div>
    <div class="home-title">Vamos Montar<br>Frases!</div>
    <div class="home-sub" style="margin-top:6px;">Toque numa pergunta para começar ✨</div>
  </div>
  <div class="home-questions" style="padding:20px 20px 10px;" id="home-questions"></div>
  <div style="padding: 0 20px 24px;">
    <button class="manage-btn" onclick="goTo('settings')">⚙️ Gerenciar Conteúdo</button>
  </div>
</div>

<div id="screen-builder" class="screen">
  <div class="top-bar">
    <button class="icon-btn back" onclick="goTo('home')">←</button>
    <h1 id="builder-title">Montando frase</h1>
    <button class="icon-btn" style="background:var(--c3);color:white;" onclick="speakSentence()">🔊</button>
  </div>
  <div class="sentence-zone">
    <div class="sentence-label">Minha frase 👇</div>
    <div class="sentence-words" id="sentence-words">
      <div class="sentence-placeholder" id="sentence-placeholder">Toque nas palavras abaixo para montar sua frase! 😊</div>
    </div>
  </div>
  <div class="sentence-actions">
    <button class="act-btn speak" onclick="speakSentence()">🔊 Falar</button>
    <button class="act-btn celebrate" onclick="celebrate()">🎉 Pronto!</button>
    <button class="act-btn clear" onclick="clearSentence()">🗑️ Apagar</button>
  </div>
  <div class="step-bar" id="step-bar"></div>
  <div class="cat-label" id="cat-label"></div>
  <div class="word-grid" id="word-grid"></div>
  <div class="skip-row">
    <button class="skip-btn" onclick="skipStep()">Pular esta palavra ➜</button>
  </div>
</div>

<div id="screen-settings" class="screen">
  <div class="top-bar">
    <button class="icon-btn back" onclick="goTo('home')">←</button>
    <h1>⚙️ Gerenciar</h1>
    <div style="width:52px;"></div>
  </div>
  <div class="settings-section">
    <div class="settings-title">➕ Nova Pergunta</div>
    <div class="settings-form">
      <div class="form-group">
        <label>Emoji</label>
        <div class="emoji-options" id="q-emoji-options">
          <button class="ep-btn selected" data-e="🤔">🤔</button>
          <button class="ep-btn" data-e="🌟">🌟</button>
          <button class="ep-btn" data-e="🎯">🎯</button>
          <button class="ep-btn" data-e="❓">❓</button>
          <button class="ep-btn" data-e="🏠">🏠</button>
          <button class="ep-btn" data-e="🎮">🎮</button>
          <button class="ep-btn" data-e="🍕">🍕</button>
          <button class="ep-btn" data-e="❤️">❤️</button>
        </div>
      </div>
      <div class="form-group"><label>Texto da Pergunta</label><input type="text" id="new-q-text" placeholder="Ex: O que você quer beber?" /></div>
      <div class="form-group"><label>Cor</label>
        <select id="new-q-color">
          <option value="c1">🔴 Vermelho</option><option value="c2">🟠 Laranja</option><option value="c3">🔵 Azul</option><option value="c4">🟣 Roxo</option><option value="c5">🟢 Verde</option><option value="c6">💗 Rosa</option><option value="c7">🟡 Amarelo</option><option value="c8">🩵 Ciano</option>
        </select>
      </div>
      <button class="add-btn" onclick="addQuestion()">Adicionar Pergunta ✨</button>
    </div>
    <div class="items-list" id="questions-list"></div>
  </div>
  <div class="settings-section" style="margin-top:8px;">
    <div class="settings-title">📝 Nova Palavra</div>
    <div class="settings-form">
      <div class="form-group"><label>Para qual pergunta?</label><select id="new-w-q" onchange="updateStepSelector()"></select></div>
      <div class="form-group"><label>Etapa (posição)</label><select id="new-w-step"></select></div>
      <div class="form-row">
        <div class="form-group"><label>Palavra</label><input type="text" id="new-w-text" placeholder="Ex: brincar" /></div>
        <div class="form-group"><label>Emoji</label><input type="text" id="new-w-emoji" placeholder="🎮" maxlength="4" style="font-size:1.5rem;text-align:center;" /></div>
      </div>
      <div class="form-group"><label>Cor</label>
        <select id="new-w-color">
          <option value="c1">🔴 Vermelho</option><option value="c2">🟠 Laranja</option><option value="c3">🔵 Azul</option><option value="c4">🟣 Roxo</option><option value="c5">🟢 Verde</option><option value="c6">💗 Rosa</option><option value="c7">🟡 Amarelo</option><option value="c8">🩵 Ciano</option>
        </select>
      </div>
      <button class="add-btn" onclick="addWord()">Adicionar Palavra ✨</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="celebrate-modal">
  <div class="modal-card">
    <div class="modal-emoji">🎊</div>
    <div class="modal-title">Que incrível!</div>
    <div class="modal-sentence" id="modal-sentence-text"></div>
    <div class="modal-btns">
      <button class="modal-btn again" onclick="resetBuilder()">🔄 Montar outra!</button>
      <button class="modal-btn home" onclick="goTo('home')">🏠 Voltar ao início</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const COLORS = {
  c1:{bg:'#FF6B6B',light:'#FFE5E5',dark:'#CC4444',text:'white'},
  c2:{bg:'#FF9F43',light:'#FFF3E0',dark:'#CC7A1E',text:'white'},
  c3:{bg:'#54A0FF',light:'#E8F4FF',dark:'#2277DD',text:'white'},
  c4:{bg:'#5F27CD',light:'#EDE7F6',dark:'#3D1590',text:'white'},
  c5:{bg:'#1DD1A1',light:'#E0FAF3',dark:'#0ABF76',text:'white'},
  c6:{bg:'#FF6EB4',light:'#FFE8F4',dark:'#CC3D88',text:'white'},
  c7:{bg:'#FECA57',light:'#FFFDE7',dark:'#C9A000',text:'#5a3e00'},
  c8:{bg:'#48DBFB',light:'#E3FAFF',dark:'#00B4D8',text:'#00455e'},
};

function defaultData() {
  return { questions: [
    { id:'q1', text:'O que você quer fazer?', emoji:'🤔', color:'c3', steps:[
      { label:'EU', fixed:true, words:[{text:'Eu',emoji:'🧒',color:'c5',w:1}]},
      { label:'QUERO', words:[{text:'quero',emoji:'💛',color:'c7',w:5},{text:'gosto de',emoji:'❤️',color:'c1',w:3},{text:'adoro',emoji:'😍',color:'c6',w:2}]},
      { label:'O QUÊ', words:[{text:'brincar',emoji:'🎮',color:'c3',w:5},{text:'desenhar',emoji:'🎨',color:'c6',w:4},{text:'dançar',emoji:'💃',color:'c1',w:3},{text:'cantar',emoji:'🎵',color:'c4',w:3},{text:'correr',emoji:'🏃',color:'c5',w:3},{text:'pular',emoji:'🦘',color:'c2',w:2},{text:'nadar',emoji:'🏊',color:'c8',w:2},{text:'ver TV',emoji:'📺',color:'c7',w:4},{text:'ler livros',emoji:'📚',color:'c2',w:2},{text:'jogar bola',emoji:'⚽',color:'c5',w:4}]},
      { label:'QUANDO', words:[{text:'agora!',emoji:'⚡',color:'c1',w:5},{text:'hoje',emoji:'📅',color:'c3',w:4},{text:'amanhã',emoji:'🌅',color:'c2',w:3},{text:'no final de semana',emoji:'🎉',color:'c5',w:3},{text:'de tarde',emoji:'🌇',color:'c6',w:2}]}
    ]},
    { id:'q2', text:'Onde você vai?', emoji:'🗺️', color:'c2', steps:[
      { label:'EU', fixed:true, words:[{text:'Eu',emoji:'🧒',color:'c5',w:1}]},
      { label:'VOU', words:[{text:'vou',emoji:'🚶',color:'c3',w:5},{text:'quero ir',emoji:'👉',color:'c2',w:3}]},
      { label:'PARA ONDE', words:[{text:'ao parque',emoji:'🌳',color:'c5',w:5},{text:'à escola',emoji:'🏫',color:'c3',w:5},{text:'à casa da vovó',emoji:'👵',color:'c6',w:4},{text:'ao mercado',emoji:'🛒',color:'c2',w:3},{text:'à praia',emoji:'🏖️',color:'c8',w:3},{text:'ao cinema',emoji:'🎬',color:'c4',w:2},{text:'à piscina',emoji:'🏊',color:'c8',w:2},{text:'ao parquinho',emoji:'🛝',color:'c5',w:4},{text:'ao médico',emoji:'🏥',color:'c1',w:2},{text:'ao shopping',emoji:'🏬',color:'c7',w:3}]},
      { label:'COM QUEM', words:[{text:'com mamãe',emoji:'👩',color:'c6',w:5},{text:'com papai',emoji:'👨',color:'c3',w:5},{text:'com a família',emoji:'👨‍👩‍👦',color:'c7',w:4},{text:'com meu amigo',emoji:'👫',color:'c5',w:3},{text:'sozinho',emoji:'🙋',color:'c2',w:2}]}
    ]},
    { id:'q3', text:'O que você quer comer?', emoji:'🍽️', color:'c1', steps:[
      { label:'EU', fixed:true, words:[{text:'Eu',emoji:'🧒',color:'c5',w:1}]},
      { label:'QUERO', words:[{text:'quero comer',emoji:'😋',color:'c2',w:5},{text:'tenho fome de',emoji:'🤤',color:'c1',w:3}]},
      { label:'O QUÊ', words:[{text:'pizza',emoji:'🍕',color:'c1',w:5},{text:'macarrão',emoji:'🍝',color:'c2',w:4},{text:'arroz e feijão',emoji:'🍚',color:'c5',w:4},{text:'sorvete',emoji:'🍦',color:'c8',w:5},{text:'fruta',emoji:'🍎',color:'c1',w:3},{text:'pão',emoji:'🍞',color:'c7',w:3},{text:'bolo',emoji:'🎂',color:'c6',w:4},{text:'chocolate',emoji:'🍫',color:'c2',w:5},{text:'biscoito',emoji:'🍪',color:'c7',w:4},{text:'suco',emoji:'🥤',color:'c5',w:3}]}
    ]},
    { id:'q4', text:'O que você gosta?', emoji:'❤️', color:'c6', steps:[
      { label:'EU', fixed:true, words:[{text:'Eu',emoji:'🧒',color:'c5',w:1}]},
      { label:'SENTIMENTO', words:[{text:'gosto muito de',emoji:'😊',color:'c5',w:5},{text:'adoro',emoji:'😍',color:'c6',w:4},{text:'amo',emoji:'❤️',color:'c1',w:3}]},

      { label:'QUANDO', words:[{text:'amanhã!',emoji:'🌅',color:'c2',w:5},{text:'hoje à tarde',emoji:'🌇',color:'c6',w:4},{text:'no fim de semana',emoji:'🎉',color:'c7',w:4},{text:'nas férias',emoji:'🏖️',color:'c8',w:3},{text:'sempre!',emoji:'♾️',color:'c4',w:3}]}

}

let data = JSON.parse(localStorage.getItem('ngram_v2') || 'null') || defaultData();
function saveData() { localStorage.setItem('ngram_v2', JSON.stringify(data)); }

function goTo(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  if (id === 'home') renderHome();
  if (id === 'settings') renderSettings();
}

function renderHome() {
  const c = document.getElementById('home-questions');
  c.innerHTML = '';
  data.questions.forEach(q => {
    const col = COLORS[q.color] || COLORS.c3;
    const btn = document.createElement('button');
    btn.className = 'q-btn';
    btn.style.background = col.bg;
    btn.style.color = col.text;
    btn.style.boxShadow = `0 8px 0 ${col.dark}`;
    btn.innerHTML = `<span class="q-icon">${q.emoji}</span><span class="q-text">${q.text}</span><span class="q-arrow">▶</span>`;
    btn.onclick = () => startBuilder(q.id);
    c.appendChild(btn);
  });
}
renderHome();

let currentQ = null, stepIndex = 0, sentence = [];

function startBuilder(qid) {
  currentQ = data.questions.find(q => q.id === qid);
  if (!currentQ) return;
  stepIndex = 0; sentence = [];
  goTo('builder');
  document.getElementById('builder-title').textContent = currentQ.text;
  renderSentence();
  renderStep();
  autoAdvanceFixed();
}

function autoAdvanceFixed() {
  while (stepIndex < currentQ.steps.length && currentQ.steps[stepIndex].fixed) {
    const w = currentQ.steps[stepIndex].words[0];
    sentence.push(w); stepIndex++;
    renderSentence();
  }
  renderStep();
}

function addWordToSentence(w) {
  sentence.push(w); stepIndex++;
  renderSentence();
  if (stepIndex < currentQ.steps.length && currentQ.steps[stepIndex].fixed) autoAdvanceFixed();
  else renderStep();
}

function renderSentence() {
  const container = document.getElementById('sentence-words');
  const ph = document.getElementById('sentence-placeholder');
  ph.style.display = sentence.length ? 'none' : 'block';
  Array.from(container.children).forEach(ch => { if (ch !== ph) ch.remove(); });
  sentence.forEach((w, idx) => {
    const col = COLORS[w.color] || COLORS.c3;
    const chip = document.createElement('div');
    chip.className = 'sentence-chip';
    chip.style.background = col.bg; chip.style.color = col.text;
    chip.innerHTML = `<span>${w.emoji}</span>${w.text}<span class="chip-x">✕</span>`;
    chip.onclick = () => { sentence.splice(idx); stepIndex = idx; renderSentence(); renderStep(); if(stepIndex<currentQ.steps.length && currentQ.steps[stepIndex].fixed) autoAdvanceFixed(); };
    container.appendChild(chip);
  });
}

function renderStep() {
  const sb = document.getElementById('step-bar');
  const cl = document.getElementById('cat-label');
  const grid = document.getElementById('word-grid');
  sb.innerHTML = '';
  currentQ.steps.forEach((_,i) => {
    const d = document.createElement('div');
    d.className = 'step-dot' + (i < stepIndex ? ' done' : i === stepIndex ? ' active' : '');
    sb.appendChild(d);
  });
  if (stepIndex >= currentQ.steps.length) {
    cl.textContent = '🎉 Frase completa! Toque em Pronto!';
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:24px;font-size:4rem;">🎊</div>';
    return;
  }
  const step = currentQ.steps[stepIndex];
  cl.textContent = `👉 Escolha: ${step.label}`;
  const sorted = [...step.words].sort((a,b) => (b.w||1)-(a.w||1));
  grid.innerHTML = '';
  sorted.forEach(w => {
    const col = COLORS[w.color] || COLORS.c3;
    const btn = document.createElement('button');
    btn.className = 'word-btn';
    btn.style.background = col.light;
    btn.style.boxShadow = `0 8px 0 ${col.bg}66`;
    btn.style.border = `3px solid ${col.bg}`;
    btn.innerHTML = `<span class="w-emoji">${w.emoji}</span><span class="w-text" style="color:${col.dark}">${w.text}</span>`;
    btn.onclick = () => { btn.style.background = col.bg; btn.style.color = 'white'; setTimeout(() => addWordToSentence(w), 180); };
    grid.appendChild(btn);
  });
}

function skipStep() {
  if (stepIndex < currentQ.steps.length) { stepIndex++; if(stepIndex<currentQ.steps.length && currentQ.steps[stepIndex].fixed) autoAdvanceFixed(); else renderStep(); }
}

function clearSentence() { sentence = []; stepIndex = 0; renderSentence(); renderStep(); autoAdvanceFixed(); }

function speakSentence() {
  const text = sentence.map(w => w.text).join(' ');
  if (!text) { showToast('📢 Monte uma frase primeiro!'); return; }
  if ('speechSynthesis' in window) { speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(text); u.lang='pt-BR'; u.rate=0.85; speechSynthesis.speak(u); }
  else showToast('🔇 Fala não disponível');
}

function celebrate() {
  const text = sentence.map(w => w.text).join(' ');
  if (!text) { showToast('🧩 Monte uma frase primeiro!'); return; }
  document.getElementById('modal-sentence-text').textContent = text;
  document.getElementById('celebrate-modal').classList.add('show');
  launchConfetti(); speakSentence();
}
function resetBuilder() { document.getElementById('celebrate-modal').classList.remove('show'); clearSentence(); }

function launchConfetti() {
  const cols = ['#FF6B6B','#FF9F43','#54A0FF','#1DD1A1','#FECA57','#FF6EB4','#5F27CD'];
  for (let i=0; i<60; i++) {
    const el = document.createElement('div'); el.className='confetti-piece';
    el.style.left = Math.random()*100+'vw'; el.style.top='-20px';
    el.style.background = cols[Math.floor(Math.random()*cols.length)];
    el.style.width=(8+Math.random()*10)+'px'; el.style.height=(8+Math.random()*10)+'px';
    el.style.animationDuration=(2+Math.random()*2)+'s'; el.style.animationDelay=Math.random()*.8+'s';
    document.body.appendChild(el); setTimeout(()=>el.remove(),4000);
  }
}

let selectedQEmoji = '🤔';
function renderSettings() {
  const ql = document.getElementById('questions-list');
  ql.innerHTML = '';
  data.questions.forEach((q,idx) => {
    const div = document.createElement('div'); div.className='item-row';
    div.innerHTML = `<div class="item-row-info"><strong>${q.emoji} ${q.text}</strong><span>${q.steps.length} etapas • ${q.steps.reduce((a,s)=>a+s.words.length,0)} palavras</span></div><button class="del-btn" onclick="deleteQuestion(${idx})">🗑️</button>`;
    ql.appendChild(div);
  });
  const wq = document.getElementById('new-w-q');
  wq.innerHTML = '';
  data.questions.forEach(q => { const o=document.createElement('option'); o.value=q.id; o.textContent=q.emoji+' '+q.text; wq.appendChild(o); });
  updateStepSelector();
  document.querySelectorAll('#q-emoji-options .ep-btn').forEach(b => {
    b.onclick = () => { document.querySelectorAll('#q-emoji-options .ep-btn').forEach(x=>x.classList.remove('selected')); b.classList.add('selected'); selectedQEmoji=b.dataset.e; };
  });
}

function updateStepSelector() {
  const qid = document.getElementById('new-w-q').value;
  const q = data.questions.find(x => x.id===qid);
  const sel = document.getElementById('new-w-step'); sel.innerHTML='';
  if (!q) return;
  q.steps.forEach((s,i) => { const o=document.createElement('option'); o.value=i; o.textContent=`Passo ${i+1}: ${s.label}`; sel.appendChild(o); });
}

function addQuestion() {
  const text = document.getElementById('new-q-text').value.trim();
  const color = document.getElementById('new-q-color').value;
  if (!text) { showToast('⚠️ Escreva a pergunta!'); return; }
  data.questions.push({ id:'q'+Date.now(), text, emoji:selectedQEmoji, color, steps:[
    { label:'EU', fixed:true, words:[{text:'Eu',emoji:'🧒',color:'c5',w:1}]},
    { label:'RESPOSTA', words:[]}
  ]});
  saveData(); showToast('✅ Pergunta adicionada!');
  document.getElementById('new-q-text').value='';
  renderSettings();
}

function deleteQuestion(idx) {
  if (data.questions.length<=1) { showToast('⚠️ Mantenha ao menos uma pergunta!'); return; }
  data.questions.splice(idx,1); saveData(); renderSettings(); showToast('🗑️ Removida');
}

function addWord() {
  const qid = document.getElementById('new-w-q').value;
  const si = parseInt(document.getElementById('new-w-step').value);
  const text = document.getElementById('new-w-text').value.trim();
  const emoji = document.getElementById('new-w-emoji').value.trim()||'💬';
  const color = document.getElementById('new-w-color').value;
  if (!text) { showToast('⚠️ Escreva a palavra!'); return; }
  const q = data.questions.find(x=>x.id===qid);
  if (!q) return;
  q.steps[si].words.push({text,emoji,color,w:3});
  saveData(); showToast('✅ Palavra adicionada!');
  document.getElementById('new-w-text').value='';
  document.getElementById('new-w-emoji').value='';
}

function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

document.getElementById('celebrate-modal').addEventListener('click',function(e){ if(e.target===this)this.classList.remove('show'); });
</script>
